<!doctype html>
<html lang="en">
  <head>
    <meta name="google-site-verification" content="SvkUuK7WHyHytqRCn4q7snTO49sDBxY02La99L_L3rs" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passage Renderer</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script type="module" src="./main.js"></script>
    <script type="module">
      import { saveGame, loadGame, getSaveSlots, deleteSave } from './main.js';
      
      window.addEventListener('DOMContentLoaded', () => {
        // Save button
        document.getElementById('save-btn').addEventListener('click', () => {
          const slotName = prompt('Enter save name:', 'quicksave');
          if (slotName) {
            if (saveGame(slotName)) {
              alert(`Game saved to: ${slotName}`);
            }
          }
        });
        
        // Load button - toggles save list
        document.getElementById('load-btn').addEventListener('click', () => {
          const saveList = document.getElementById('save-list');
          if (saveList.style.display === 'block') {
            saveList.style.display = 'none';
          } else {
            saveList.style.display = 'block';
            updateSaveList();
          }
        });
        
        function updateSaveList() {
          const saveList = document.getElementById('save-list');
          const saves = getSaveSlots();
          
          if (saves.length === 0) {
            saveList.innerHTML = '<p style="color: #888;">No saves found</p>';
            return;
          }
          
          saveList.innerHTML = saves.map(save => `
            <div class="save-item">
              <div>
                <strong>${save.slotName}</strong><br>
                <small style="color: #888;">${save.date}</small>
              </div>
              <div>
                <button onclick="window.loadSaveSlot('${save.slotName}')">Load</button>
                <button onclick="window.deleteSaveSlot('${save.slotName}')">Delete</button>
              </div>
            </div>
          `).join('');
        }
        
        window.loadSaveSlot = async (slotName) => {
          await loadGame(slotName);
          document.getElementById('save-list').style.display = 'none';
        };
        
        window.deleteSaveSlot = (slotName) => {
          if (confirm(`Delete save "${slotName}"?`)) {
            deleteSave(slotName);
            updateSaveList();
          }
        };
        
        // Close save list when clicking outside
        document.addEventListener('click', (e) => {
          const saveList = document.getElementById('save-list');
          const loadBtn = document.getElementById('load-btn');
          if (saveList.style.display === 'block' && 
              !saveList.contains(e.target) && 
              e.target !== loadBtn) {
            saveList.style.display = 'none';
          }
        });
      });
    </script>
  </head>
  <body>
    <div id="persistent-controls">
      <button id="save-btn">Save</button>
      <button id="load-btn">Load</button>
    </div>
    <div id="save-list"></div>
    <div id="display"></div>
  </body>
</html>
